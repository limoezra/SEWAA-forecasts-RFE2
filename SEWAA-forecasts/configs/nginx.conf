user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/notice.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    server_tokens       off;
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types text/plain text/css text/js text/xml text/javascript application/x-javascript application/javascript apllication/json application/xml application/rss+xml image/svg+xml;
    gzip_disable "msie6";
    gzip_comp_level 6;

    client_max_body_size 4G;
    client_body_buffer_size 100M;

    large_client_header_buffers 16 2048k;

    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # log to file
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log error;

    # direct logs to stdout
    access_log /dev/stdout main;
    error_log /dev/stderr error;
    error_log /dev/stderr info;
    error_log /dev/stderr warn;

    server {
        listen       80;
        server_name  _;

        location /static/ {
            alias /opt/interface/static/;
        }

        location /data/ {
            alias /opt/interface/forecasts/viz-data/;
        }

        location /forecasts/ {
            alias /opt/interface/forecasts/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime off;
            autoindex_format html;
        }

        location / {
            proxy_pass http://web:8000/;
            proxy_redirect off;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_pass_request_headers on;
        }

        # redirect server error pages to the static page /50x.html
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }

    }

}