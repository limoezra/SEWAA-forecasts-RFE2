{% extends 'base.html' %}

{% block title %}Documentation - SEWAA{% endblock %}

{% block styles %}
<style>
    .doc-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
    }

    .doc-header {
        text-align: center;
        margin-bottom: 2.5rem;
        padding-bottom: 1.5rem;
        border-bottom: 2px solid #e2e8f0;
    }

    .doc-header h1 {
        font-size: 2rem;
        color: #2d3748;
        margin-bottom: 0.5rem;
    }

    .doc-header p {
        color: #718096;
        font-size: 1rem;
    }

    .doc-content {
        font-size: 1.05rem;
        line-height: 1.8;
        color: #2d3748;
    }

    .doc-content h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1e3a5f;
        margin-top: 2.5rem;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #e2e8f0;
    }

    .doc-content h2 {
        font-size: 1.4rem;
        font-weight: 700;
        color: #2d3748;
        margin-top: 2rem;
        margin-bottom: 0.75rem;
    }

    .doc-content h3 {
        font-size: 1.2rem;
        font-weight: 600;
        color: #4a5568;
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
    }

    .doc-content p {
        margin-bottom: 1rem;
    }

    .doc-content a {
        color: #2d6a9f;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 0.2s;
    }

    .doc-content a:hover {
        border-bottom-color: #2d6a9f;
    }

    .doc-content code {
        background: #f0f4f8;
        color: #e53e3e;
        padding: 0.15em 0.4em;
        border-radius: 4px;
        font-size: 0.9em;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    .doc-content pre {
        background: #1e293b;
        color: #e2e8f0;
        padding: 1.25rem;
        border-radius: 8px;
        overflow-x: auto;
        margin: 1.25rem 0;
        font-size: 0.9rem;
        line-height: 1.6;
    }

    .doc-content pre code {
        background: none;
        color: inherit;
        padding: 0;
        border-radius: 0;
        font-size: inherit;
    }

    .doc-content ul, .doc-content ol {
        margin-bottom: 1rem;
        padding-left: 1.5rem;
    }

    .doc-content li {
        margin-bottom: 0.4rem;
    }

    .doc-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.25rem 0;
    }

    .doc-content th, .doc-content td {
        padding: 0.75rem 1rem;
        border: 1px solid #e2e8f0;
        text-align: left;
    }

    .doc-content th {
        background: #f7fafc;
        font-weight: 600;
        color: #2d3748;
    }

    .doc-content blockquote {
        border-left: 4px solid #4a9fd5;
        margin: 1.25rem 0;
        padding: 0.75rem 1.25rem;
        background: #f7fafc;
        color: #4a5568;
    }

    .doc-content img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
    }

    @media (max-width: 768px) {
        .doc-container {
            padding: 1rem;
        }

        .doc-header h1 {
            font-size: 1.5rem;
        }

        .doc-content {
            font-size: 1rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="doc-container">
    <div class="doc-header">
        <h1><i class="bi bi-file-earmark-text"></i> Project Documentation</h1>
        <p>SEWAA Forecasts &mdash; Installation, setup, and usage guide</p>
    </div>
    <div class="doc-content">
        {{ doc_content | safe }}
    </div>
</div>
{% endblock %}
